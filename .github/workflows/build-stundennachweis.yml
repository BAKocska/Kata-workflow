name: Build Stundennachweis .exe

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

permissions:
  contents: write  # Needed to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install openpyxl pyinstaller

      - name: Build .exe
        working-directory: stundennachweis/scripts
        run: |
          pyinstaller --onefile --windowed --name Stundennachweis_Generator gui.py

      - name: Package release zip
        run: |
          mkdir release
          copy stundennachweis\scripts\dist\Stundennachweis_Generator.exe release\
          copy stundennachweis\ship\empty_template.xlsx release\
          copy stundennachweis\ship\ANLEITUNG.txt release\
          cd release && tar -acf ..\Stundennachweis_Generator.zip *

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>nul || echo "No existing release"
          gh release create latest Stundennachweis_Generator.zip --title "Stundennachweis Generator" --notes "Download the zip, extract, and double-click Stundennachweis_Generator.exe"
